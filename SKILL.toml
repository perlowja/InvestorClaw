[skill]
name = "investorclaw"
version = "1.0.0"
description = "FINOS CDM 5.x-compliant portfolio analysis. Holdings snapshots, performance, bonds, analyst consensus, news, reports."
author = "Jason Perlow"
tags = ["finance", "portfolio", "analysis", "bonds", "news"]

prompts = ["""
You have InvestorClaw portfolio analysis tools. ALWAYS use the shell tool to run the exact commands below.
Never generate portfolio data from memory or prior sessions — always execute the command and use its actual output.
All output is EDUCATIONAL ANALYSIS - NOT INVESTMENT ADVICE.

/portfolio setup:
  shell: python3 investorclaw.py setup

/portfolio holdings:
  shell: python3 investorclaw.py holdings

/portfolio performance:
  shell: python3 investorclaw.py performance

/portfolio bonds:
  shell: python3 investorclaw.py bonds

/portfolio analyst:
  shell: python3 investorclaw.py analyst

/portfolio news:
  shell: python3 investorclaw.py news

/portfolio synthesize:
  shell: python3 investorclaw.py synthesize

/portfolio session:
  shell: python3 investorclaw.py session

/portfolio report:
  shell: python3 investorclaw.py eod-report

/portfolio update-identity:
  shell: python3 investorclaw.py update-identity

/portfolio guardrails:
  shell: python3 investorclaw.py guardrails

/portfolio lookup --accounts:
  shell: python3 investorclaw.py lookup --accounts

/portfolio lookup --symbol TICKER:
  shell: python3 investorclaw.py lookup --symbol TICKER

If a command fails, report the exact error. Do not fabricate success responses.
"""]

[[tools]]
name = "portfolio_setup"
description = "Detect portfolio CSVs and initialize environment. Command: python3 investorclaw.py setup"
kind = "shell"
command = "python3 investorclaw.py setup"

[[tools]]
name = "portfolio_holdings"
description = "Fetch live prices and build holdings snapshot. Command: python3 investorclaw.py holdings"
kind = "shell"
command = "python3 investorclaw.py holdings"

[[tools]]
name = "portfolio_performance"
description = "Analyze performance metrics. Command: python3 investorclaw.py performance"
kind = "shell"
command = "python3 investorclaw.py performance"

[[tools]]
name = "portfolio_bonds"
description = "Fixed income analysis. Command: python3 investorclaw.py bonds"
kind = "shell"
command = "python3 investorclaw.py bonds"

[[tools]]
name = "portfolio_analyst"
description = "Fetch analyst consensus ratings. Command: python3 investorclaw.py analyst"
kind = "shell"
command = "python3 investorclaw.py analyst"

[[tools]]
name = "portfolio_news"
description = "Fetch portfolio news by ticker. Command: python3 investorclaw.py news"
kind = "shell"
command = "python3 investorclaw.py news"

[[tools]]
name = "portfolio_synthesize"
description = "Generate portfolio synthesis report. Command: python3 investorclaw.py synthesize"
kind = "shell"
command = "python3 investorclaw.py synthesize"

[[tools]]
name = "portfolio_session"
description = "Initialize CDM session. Command: python3 investorclaw.py session"
kind = "shell"
command = "python3 investorclaw.py session"

[[tools]]
name = "portfolio_report"
description = "Generate end-of-day report. Command: python3 investorclaw.py eod-report"
kind = "shell"
command = "python3 investorclaw.py eod-report"

[[tools]]
name = "portfolio_update_identity"
description = "Apply model identity and guardrails. Command: python3 investorclaw.py update-identity"
kind = "shell"
command = "python3 investorclaw.py update-identity"

[[tools]]
name = "portfolio_guardrails"
description = "Check guardrails compliance. Command: python3 investorclaw.py guardrails"
kind = "shell"
command = "python3 investorclaw.py guardrails"

[[tools]]
name = "portfolio_lookup"
description = "Lookup ticker or account details. Command: python3 investorclaw.py lookup [--accounts|--symbol TICKER]"
kind = "shell"
command = "python3 investorclaw.py lookup"
