name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install runtime dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install dev dependencies
      run: pip install -r requirements-dev.txt

    - name: Validate syntax (all Python source files)
      run: pytest tests/test_syntax.py -v --tb=short

    - name: Run submission smoke test
      run: python3 tests_smoke.py

    - name: Verify entry point runs
      run: python3 investorclaw.py help
