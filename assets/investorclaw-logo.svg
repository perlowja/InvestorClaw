<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 30" width="96" height="30">
  <!-- Background pill -->
  <rect width="96" height="30" rx="5" fill="#0d0d1f" opacity="0.85"/>
  <!-- Claw icon group (left, 24x24 centered in 0–30 height) -->
  <g transform="translate(7,3)">
    <!-- Grip bar -->
    <rect x="1" y="1" width="14" height="3" rx="1.5" fill="#4a9eff" opacity="0.75"/>
    <!-- Left tine -->
    <path d="M3,4 C2,7 1,10 2,15 C2.5,17 1,19 1,21" stroke="#4a9eff" stroke-width="1.8"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center tine -->
    <path d="M8,4 C8,8 8,12 8,16 C8,18 7,20 7,22" stroke="#4a9eff" stroke-width="1.8"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right tine -->
    <path d="M13,4 C14,7 15,10 14,15 C13.5,17 15,19 15,21" stroke="#4a9eff" stroke-width="1.8"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Vertical divider -->
  <line x1="32" y1="5" x2="32" y2="25" stroke="#4a9eff" stroke-width="0.6" opacity="0.35"/>
  <!-- Logotype -->
  <text x="37" y="13" font-family="monospace" font-size="9" font-weight="bold"
        fill="#4a9eff" letter-spacing="0.5">INVESTOR</text>
  <text x="37" y="25" font-family="monospace" font-size="11" font-weight="bold"
        fill="#e8e8e8" letter-spacing="1">CLAW</text>
</svg>
