# InvestorClaw canonical agent contract — route table
#
# This is the single source of truth for which user intents map to which
# InvestorClaw commands. Any per-runtime SKILL.md is rendered from this
# table + contract/routing_rules.md.template + a runtime-specific config
# (slash prefix, command form). See contract/render.py.
#
# Discipline:
# - Add a new intent → add a row here, not in either SKILL.md.
# - Rename a command → change here, both SKILL.mds re-render automatically.
# - Drift between SKILL.mds becomes structurally impossible because they're
#   rendered from this canonical source.

[contract]
schema_version = "1.0"
canonical_engine_version = "2.2.3"  # bump when this contract changes
# Source-of-truth list of every path that is FORBIDDEN for finance prompts.
# Both SKILL.mds enumerate these verbatim from this list at render time.
forbidden_paths = [
    "your own training data or internal knowledge of recent prices or events",
    "any model-native real-time, search, or browsing capability your underlying provider may have given you (Gemini Search, Grok real-time, ChatGPT browsing, Claude web access, etc.)",
    "any agent-level web tool the host runtime exposes (`web_search`, `web_fetch`, `browser`, `fetch_url`, `http_get`, etc.)",
    "any third-party research integration the user may have configured (Perplexity, Tavily, Brave, Exa, SerpAPI, Bing, Google, Kagi, etc.)",
    "any MCP server, plugin, or other skill that returns market, ticker, news, or macro data from a non-InvestorClaw source",
    "any cached or memoized result from a previous non-InvestorClaw call",
]

# ---------------------------------------------------------------------------
# Per-runtime adapter configuration
# ---------------------------------------------------------------------------
# Each runtime adapter declares its slash prefix and command-form preference.
# render.py uses these to produce the runtime-appropriate SKILL.md.

[runtimes.claws]
# OpenClaw / Hermes / ZeroClaw / standalone
slash_prefix = "/portfolio"
command_form = "investorclaw <cmd>"          # shell invocation form
runtime_label = "OpenClaw / Hermes / ZeroClaw / standalone"
target_skill_md = "SKILL.md"                  # repo root

# Phase 3.5 of IC_DECOMPOSITION: the Claude Code plugin moved to its own
# repo at gitlab.com/argonautsystems/InvestorClaude. The Claude-Code-side
# routing-rules render lives there now (under InvestorClaude/contract/
# if maintained, or inline in the plugin's slash-command markdown).
# This file no longer renders a Claude Code SKILL.md target — the
# `claws` runtime above is the only render target maintained here.

# ---------------------------------------------------------------------------
# Route table — user intent → canonical command
# ---------------------------------------------------------------------------
# Each route declares:
#   intent      — natural-language intent the user expresses
#   v22_command — canonical v2.2 9-tool consolidated form (with --section)
#   v21_alias   — legacy v2.1 per-noun alias (kept permanent per RFC §8)
#   examples    — natural-language phrasings that map to this intent
#
# Both v22_command and v21_alias resolve to the same Python script via the
# SECTION_DISPATCH layer in runtime/router.py — they are presentation aliases,
# not separate code paths.

[[routes]]
intent       = "holdings"
v22_command  = "view --section=holdings"
v21_alias    = "holdings"
examples     = ["What's in my portfolio?", "Show my holdings", "What do I own?"]

[[routes]]
intent       = "performance"
v22_command  = "view --section=performance"
v21_alias    = "performance"
examples     = ["How am I doing?", "What's my Sharpe?", "Performance this year?"]

[[routes]]
intent       = "bonds_analysis"
v22_command  = "bonds --section=analysis"
v21_alias    = "bonds"
examples     = ["Show my bonds", "Bond exposure?", "YTM on my fixed income?"]

[[routes]]
intent       = "bonds_strategy"
v22_command  = "bonds --section=strategy"
v21_alias    = "fixed-income"
examples     = ["Bond laddering strategy?", "Duration view?", "Fixed-income strategy?"]

[[routes]]
intent       = "rebalance"
v22_command  = "scenario --section=rebalance"
v21_alias    = "optimize sharpe"
examples     = ["Should I rebalance?", "Run scenarios", "Maximize Sharpe?"]

[[routes]]
intent       = "rebalance_tax"
v22_command  = "scenario --section=tax-aware"
v21_alias    = "rebalance-tax"
examples     = ["Rebalance with tax impact", "Tax-aware rebalance"]

[[routes]]
intent       = "synthesize"
v22_command  = "compute --section=synthesize"
v21_alias    = "synthesize"
examples     = ["Analyze my portfolio", "Give overview", "Full picture"]

[[routes]]
intent       = "analyst"
v22_command  = "view --section=analyst"
v21_alias    = "analyst"
examples     = ["What does Wall Street think?", "Analyst ratings"]

[[routes]]
intent       = "news_holdings"
v22_command  = "view --section=news"
