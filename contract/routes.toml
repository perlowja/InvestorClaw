[[routes]]
intent       = "setup"
v22_command  = "config --section=setup"
v21_alias    = "setup"
examples     = ["Setup InvestorClaw", "Configure"]

[[routes]]
intent       = "guardrails"
v22_command  = "config --section=guardrails"
v21_alias    = "guardrails"
examples     = ["Configure guardrails", "Educational rules?"]

# forbidden_paths now lives under [contract] at the top of this file (TOML
# scoping requires top-level arrays to live before any section header — they
# can't appear after [[routes]] tables since they'd get parsed as nested).
