examples     = ["Any news on my holdings?", "Recent headlines on my stocks"]

[[routes]]
intent       = "news_market_general"
v22_command  = "market --section=news --topic=general"
v21_alias    = "market-news --topic general"
examples     = ["What's happening in markets?", "General market news"]

[[routes]]
intent       = "news_market_crypto"
v22_command  = "market --section=news --topic=crypto"
v21_alias    = "market-news --topic crypto"
examples     = ["Crypto news?", "BTC headlines", "Bitcoin news today"]

[[routes]]
intent       = "news_market_merger"
v22_command  = "market --section=news --topic=merger"
v21_alias    = "market-news --topic merger"
examples     = ["M&A news?", "Mergers today", "Big acquisition headlines?"]

[[routes]]
intent       = "news_market_forex"
v22_command  = "market --section=news --topic=forex"
v21_alias    = "market-news --topic forex"
examples     = ["Currency news?", "Forex headlines", "Dollar news"]

[[routes]]
intent       = "deflect_concept"
v22_command  = "market --section=concept"
v21_alias    = "concept"
examples     = ["What is YTM?", "Explain Sharpe ratio", "Define alpha"]

[[routes]]
intent       = "deflect_market_data"
v22_command  = "market --section=market"
v21_alias    = "market"
examples     = ["Price of NVDA?", "S&P 500 level?", "VIX?"]

[[routes]]
intent       = "lookup"
v22_command  = "lookup --symbol <TICKER>"
v21_alias    = "lookup --symbol <TICKER>"
examples     = ["Tell me about AAPL", "What's NVDA worth?"]

[[routes]]
intent       = "accounts"
v22_command  = "lookup --accounts"
v21_alias    = "lookup --accounts"
examples     = ["What accounts do I have?", "Show my brokerages"]

[[routes]]
intent       = "report"
v22_command  = "eod-report"
v21_alias    = "eod-report"
